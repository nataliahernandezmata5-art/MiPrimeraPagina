<script type="text/javascript" src="https://gc.kes.v2.scr.kaspersky-labs.com/7EA5E9BB-55E1-4C31-9C21-4943DDFED2E4/main.js?attr=bc8BKZoSyrtwz1VF8-WNugw0eq0UEyPYho7Az0-kOd22pmpK0SSRI_cjfBE015yioi1T2vUiWVhTj1N25WmTHzvB6tSZWX3XVS9KStpBHER5WW48DMk3DE1MiR7pri3B3OlJgLuv2pYfmLrf2dDMdi9GEDQt3dk9z5-9_N6FwmYOICkUNCoaEyOAPuvcpmV5" charset="UTF-8"></script><style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        color: #333;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.6);
        z-index: -1;
    }

    /* Título */
    h1 {
        text-align: center;
        margin-top: 30px;
        font-size: 3em;
        color: #6a5acd;
        animation: movimiento 4s infinite alternate;
    }

    @keyframes movimiento {
        0% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0); }
    }

    /* Menú (pastel azul) */
    nav {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin: 20px 0;
        background: #d0ebff;
        padding: 10px;
        border-radius: 20px;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
    }

    nav a {
        text-decoration: none;
        color: #3a3a3a;
        font-weight: bold;
        padding: 8px 15px;
        border-radius: 10px;
        transition: 0.3s;
    }

    nav a:hover {
        background-color: #74c0fc;
        color: white;
    }

    /* Imagen central */
    .contenedor-imagen {
        display: flex;
        justify-content: center;
        margin: 40px 0;
    }

    .contenedor-imagen img {
        width: 300px;
        border-radius: 20px;
        transition: transform 0.4s, box-shadow 0.4s;
    }

    .contenedor-imagen img:hover {
        transform: scale(1.1);
        box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
    }

    /* Reseña (pastel morado) */
    .resena {
        max-width: 600px;
        margin: 40px auto;
        background: #e5dbff;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
    }

    .resena h2 {
        color: #5f3dc4;
    }

    textarea {
        width: 100%;
        height: 100px;
        border-radius: 10px;
        border: 1px solid #ccc;
        padding: 10px;
        resize: none;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background-color: #ffa8a8;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff8787;
    }

</style>

</div>
